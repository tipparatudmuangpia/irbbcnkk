function Badge({ children, color = "stone", size = "sm" }) {
  const palettes = {
    stone: "bg-stone-100 text-stone-700 border-stone-200",
    teal: "bg-[var(--teal-soft)] text-[var(--teal-deep)] border-[var(--teal)]/20",
    gold: "bg-[var(--gold-soft)] text-[var(--gold)] border-[var(--gold)]/30",
    moss: "bg-[var(--moss-soft)] text-[var(--moss)] border-[var(--moss)]/30",
    terra: "bg-[var(--terra-soft)] text-[var(--terra)] border-[var(--terra)]/30",
    plum: "bg-[var(--plum-soft)] text-[var(--plum)] border-[var(--plum)]/30",
  };
  const sizes = size === "sm" ? "text-[10.5px] px-2 py-0.5" : "text-xs px-2.5 py-1";
  return <span className={`inline-flex items-center gap-1 ${sizes} rounded-full border font-medium tracking-wide ${palettes[color] || palettes.stone}`}>{children}</span>;
}

function StatusPill({ status }) {
  const m = STATUS_META[status] || STATUS_META.submitted;
  return (
    <span className={`inline-flex items-center gap-1.5 rounded-full border px-2.5 py-1 text-[11px] font-medium ${m.color}`}>
      <span className={`h-1.5 w-1.5 rounded-full ${m.dot}`} />
      {m.label}
    </span>
  );
}

function Btn({ children, onClick, variant = "primary", size = "md", icon: Icon, type = "button", disabled = false, className = "" }) {
  const base = "inline-flex items-center justify-center gap-2 rounded-md font-medium transition-all duration-150 disabled:opacity-40 disabled:cursor-not-allowed";
  const sizes = { sm: "px-3 py-1.5 text-[12.5px]", md: "px-4 py-2 text-sm", lg: "px-5 py-2.5 text-[15px]" };
  const variants = {
    primary: "bg-[var(--teal)] text-white hover:bg-[var(--teal-deep)] shadow-sm",
    gold: "bg-[var(--gold)] text-white hover:opacity-90 shadow-sm",
    ghost: "text-[var(--ink)] hover:bg-[var(--paper-deep)]",
    outline: "border border-[var(--line)] bg-white text-[var(--ink)] hover:border-[var(--teal)]/40 hover:bg-[var(--teal-soft)]/30",
    danger: "bg-rose-600 text-white hover:bg-rose-700 shadow-sm",
    soft: "bg-[var(--paper-deep)] text-[var(--ink)] hover:bg-[var(--line)]",
  };
  return (
    <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${sizes[size]} ${variants[variant]} ${className}`}>
      {Icon && <Icon size={size === "sm" ? 14 : 16} strokeWidth={2} />}
      {children}
    </button>
  );
}

function Field({ label, sublabel, required, children }) {
  return (

          <div className="text-[11px] font-semibold tracking-[0.14em] uppercase text-[var(--ink-mute)]">{label}</div>

            <div className="text-[11px] mt-2 inline-flex items-center gap-1 text-[var(--moss)]">

function SubmissionDetail({ sub, onBack, reviewers }) {
  if (!sub) return null;

  },
  coordinator: {
    role: "coordinator", name: "นางสาวกัลยา เลขานุการ", firstName: "กัลยา", initials: "กล",

    email: "somsri@bcnkk.ac.th", reviewerId: "R01",
  },
  chair: {
    role: "chair", name: "ศ.ดร.ประชา ประธาน", firstName: "ประชา", initials: "ปธ",
    subtitle: "ประธานคณะกรรมการ IRB",
    email: "chair@bcnkk.ac.th",
  },
};

function App() {
  const [role, setRole] = useState("researcher");
  const [view, setView] = useState({ name: "list", id: null });
  const [showEmails, setShowEmails] = useState(false);
  const [submissions, setSubmissions] = useState(seedSubmissions);
  const [emails, setEmails] = useState(seedEmails);

  // Inject fonts
  useEffect(() => {
    const styleEl = document.createElement("style");
    styleEl.innerHTML = css;
    document.head.appendChild(styleEl);
    return () => document.head.removeChild(styleEl);
  }, []);

  // Reset view when role changes
  useEffect(() => { setView({ name: "list", id: null }); }, [role]);

  const currentUser = USERS[role];

  const handleAssign = (subId, reviewerIds) => {
    setSubmissions((prev) => prev.map((s) => {
      if (s.id !== subId) return s;
      return {
        ...s,
        status: "under_review",
        reviewers: reviewerIds.map((id, i) => ({
          id, status: i === 0 ? "in_progress" : "pending", recommendation: null, date: null,
        })),
        timeline: [...s.timeline, { date: "2569-05-07", event: `Assigned ให้กรรมการ ${reviewerIds.length} ท่าน`, actor: USERS.coordinator.name, icon: "users" }],
      };
    }));
    // Add fake email
    setEmails((prev) => [
      {
        id: prev.length + 1, ts: "2569-05-07 10:30",
        from: "irb@bcnkk.ac.th", to: reviewerIds.map((id) => seedReviewers.find((r) => r.id === id)?.email).join(", "),
        subject: `[BCNKK-IRB] 📋 มอบหมายงานพิจารณา — ${subId}`,
        type: "reviewer_assigned", submissionId: subId,
        body: `เรียนกรรมการที่ได้รับมอบหมาย\n\nคณะกรรมการ IRB ขอมอบหมายให้ท่านพิจารณาโครงการ ${subId}\nกำหนดส่งความเห็นภายใน 14 วัน\n\nกรุณา login เข้าสู่ระบบเพื่อดาวน์โหลดเอกสาร`,
      },
      ...prev,
    ]);
  };

  const handleSubmitReview = () => {
    setEmails((prev) => [
      {
        id: prev.length + 1, ts: "2569-05-07 14:15",
        from: "irb@bcnkk.ac.th", to: "irb-secretary@bcnkk.ac.th",
        subject: `[BCNKK-IRB] ✍️ กรรมการส่งความเห็นแล้ว`,
        type: "review_completed", submissionId: "BCNKK-IRB-2569-014",
        body: `กรรมการได้ส่งความเห็นเรียบร้อยแล้ว — รอกรรมการอีกท่านดำเนินการ`,
      },
      ...prev,
    ]);
  };

  const handleNewSubmission = () => {
    setEmails((prev) => [
      {
        id: prev.length + 1, ts: "2569-05-07 15:00",
        from: "irb@bcnkk.ac.th", to: currentUser.email,
        subject: "[BCNKK-IRB] ✓ ได้รับโครงการใหม่แล้ว",
        type: "submission_received", submissionId: "BCNKK-IRB-2569-NEW",
        body: `เรียน ${currentUser.name}\n\nคณะกรรมการ IRB ได้รับโครงการของท่านแล้ว — เลขที่จะแจ้งหลังคัดกรองภายใน 1-2 วันทำการ`,
      },
      ...prev,
    ]);
    setView({ name: "list", id: null });
  };

  // Render the right view based on role + state
  let content;
  if (role === "researcher") {
    if (view.name === "new") content = <NewSubmissionForm currentUser={currentUser} onCancel={() => setView({ name: "list", id: null })} onSubmit={handleNewSubmission} />;
    else if (view.name === "detail") content = <SubmissionDetail sub={submissions.find((s) => s.id === view.id)} onBack={() => setView({ name: "list", id: null })} reviewers={seedReviewers} />;
    else content = <ResearcherView submissions={submissions} onOpen={(id) => setView({ name: "detail", id })} onNew={() => setView({ name: "new", id: null })} currentUser={currentUser} />;
  } else if (role === "coordinator") {
    if (view.name === "detail") content = <CoordinatorSubmissionDetail sub={submissions.find((s) => s.id === view.id)} onBack={() => setView({ name: "list", id: null })} onAssign={handleAssign} reviewers={seedReviewers} />;
    else content = <CoordinatorView submissions={submissions} onOpen={(id) => setView({ name: "detail", id })} currentUser={currentUser} />;
  } else if (role === "reviewer") {
    if (view.name === "detail") content = <ReviewForm sub={submissions.find((s) => s.id === view.id)} onBack={() => setView({ name: "list", id: null })} onSubmitReview={handleSubmitReview} />;
    else content = <ReviewerView submissions={submissions} onOpen={(id) => setView({ name: "detail", id })} currentUser={currentUser} />;
  } else if (role === "chair") {
    content = <ChairView submissions={submissions} />;
  }

  return (
    <div className="font-body text-[var(--ink)]">
      <AppShell role={role} setRole={setRole} currentUser={currentUser}
        onShowEmails={() => setShowEmails(true)} emailCount={emails.length}>
        {content}
      </AppShell>
      <EmailDrawer open={showEmails} onClose={() => setShowEmails(false)} emails={emails} currentUser={currentUser} />
    </div>
  );
}


const root = createRoot(document.getElementById('root'));
root.render(<App />);


// Hide boot screen once mounted
const boot = document.getElementById('boot');
if (boot) {
  setTimeout(() => {
    boot.classList.add('fade');
    setTimeout(() => boot.remove(), 500);
  }, 100);
}
  </script>
</body>
</html>
